name: 日知录每日更新

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'docs/**'
      - '.github/workflows/**'
  schedule:
    - cron: '0 0 * * *'   # 北京时间 08:00
    - cron: '0 13 * * *'  # 北京时间 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取新闻
        run: python scripts/fetch_news.py

      - name: 抓取 AI 公众号
        run: python scripts/fetch_wechat_ai.py

      - name: 抓取历史股价
        run: python scripts/fetch_stock_history.py

      - name: 生成 AI 日报（仅08:00）
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push' || (github.event_name == 'schedule' && contains(github.event.schedule, '0 0 *'))
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 0 * * *" ]; then
            PUSH_TO_FEISHU=1 python scripts/generate_daily_report.py
          else
            python scripts/generate_daily_report.py
          fi

      - name: 生成页面
        run: python scripts/generate_html.py

      - name: 提交推送
        run: |
          git config user.name "RizhiluBot"
          git config user.email "bot@rizhilu"
          git add docs/
          git stash
          git pull --rebase origin main
          git stash pop
          git add docs/
          git diff --staged --quiet || git commit -m "📰 日知录更新 $(date +'%Y-%m-%d %H:%M') CST"
          git push
